{% extends 'core/base.html' %}

{% block content %}
    <h1 class="mb-4">¿Cuánto compraste?</h1>
    <p>Producto: <strong>{{ producto.nombre }}</strong></p>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Cantidad comprada</label>
            <input type="number" name="cantidad" class="form-control" min="1" value="1">
        </div>
        <button type="submit" class="btn btn-success">Confirmar</button>
        <a href="{% url 'productos:lista_compras' %}" class="btn btn-secondary">Cancelar</a>
    </form>

{% endblock %}
