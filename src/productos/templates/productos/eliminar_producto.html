{% extends 'core/base.html' %}

{% block content %}
    <h1 class="mb-4">Eliminar Producto</h1>

    <p>¿Estás seguro que querés eliminar <strong>{{ producto.nombre }}</strong>?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a href="{% url 'productos:lista' %}" class="btn btn-secondary">Cancelar</a>
    </form>

{% endblock %}
