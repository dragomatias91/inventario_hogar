{% extends 'core/base.html' %}

{% block content %}

<div class="row mt-4">
    <div class="col-md-4 offset-md-4">
        <h1 class="mb-4">Registrarse</h1>

        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-dark w-100">Registrarse</button>
        </form>

        <p class="mt-3 text-center">¿Ya tenés cuenta? <a href="{% url 'accounts:login' %}">Iniciá sesión</a></p>
    </div>
</div>

{% endblock %}
