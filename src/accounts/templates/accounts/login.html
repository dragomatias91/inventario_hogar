{% extends 'core/base.html' %}

{% block content %}

<div class="row mt-4">
    <div class="col-md-4 offset-md-4">
        <h1 class="mb-4">Iniciar Sesión</h1>

        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-dark w-100">Ingresar</button>
        </form>
    </div>
</div>

{% endblock %}
