<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario del Hogar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'core:home' %}">🏠 Inventario del Hogar</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'core:home' %}">Home</a>
                <a class="nav-link" href="{% url 'categorias:lista' %}">Categorías</a>
                <a class="nav-link" href="{% url 'productos:lista' %}">Productos</a>
                <a class="nav-link" href="{% url 'productos:lista_compras' %}">Lista de Compras</a>
                <a class="nav-link" href="{% url 'core:about' %}">About</a>
            </div>
            <div class="navbar-nav ms-auto">
                 {% if user.is_authenticated %}
                <span class="nav-link text-white">👤 {{ user.username }}</span>
                <a class="nav-link" href="{% url 'accounts:logout' %}">Logout</a>
                {% else %}
                <a class="nav-link" href="{% url 'accounts:login' %}">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4 px-4">
    {% block content %}
    {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
