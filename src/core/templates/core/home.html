{% extends 'core/base.html' %}

{% block content %}

<div style="
    background-color: #2c3e50;
    height: 400px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
">
    <div class="text-center text-white">
        <h1 style="font-size: 3rem;">🏠 Inventario del Hogar</h1>
        <p style="font-size: 1.2rem;" class="text-white-50">Administrá tus productos fácilmente</p>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-6">
        <div class="card text-center p-3">
            <h3>📦 Productos</h3>
            <p class="text-muted">Administrá tu inventario</p>
            <a href="{% url 'productos:lista' %}" class="btn btn-dark">Ver Productos</a>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card text-center p-3">
            <h3>🗂️ Categorías</h3>
            <p class="text-muted">Organizá por categorías</p>
            <a href="{% url 'categorias:lista' %}" class="btn btn-dark">Ver Categorías</a>
        </div>
    </div>
</div>

{% endblock %}
