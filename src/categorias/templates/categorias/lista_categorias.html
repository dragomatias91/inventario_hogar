{% extends 'core/base.html' %}

{% block content %}
    <h1 class="mb-4">Categorías</h1>
    <a href="{% url 'categorias:crear' %}" class="btn btn-dark mb-3">+ Nueva Categoría</a>
    <form method="GET" class="d-flex mb-3">
    <input type="text" name="q" class="form-control me-2" placeholder="Buscar categoría..." value="{{ query }}">
    <button type="submit" class="btn btn-dark">Buscar</button>
</form>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
          {% for categoria in categorias %}
          <tr>
               <td>{{ categoria.nombre }}</td>
               <td>{{ categoria.descripcion }}</td>
               <td>
                    <a href="{% url 'categorias:editar' categoria.pk %}" class="btn btn-sm btn-warning">Editar</a>
                    <a href="{% url 'categorias:eliminar' categoria.pk %}" class="btn btn-sm btn-danger">Eliminar</a>
               </td>
         </tr>
{% endfor %}
        </tbody>
    </table>

{% endblock %}
