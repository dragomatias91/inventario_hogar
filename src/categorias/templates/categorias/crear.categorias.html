{% extends 'core/base.html' %}

{% block content %}
    <h1 class="mb-4">Nueva Categoría</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-dark">Guardar</button>
        <a href="{% url 'categorias:lista' %}" class="btn btn-secondary">Cancelar</a>
    </form>

{% endblock %}
